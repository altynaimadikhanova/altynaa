<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход через Telegram</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    /* ── Экран 1: Вход ── */
    #screen-login h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    #screen-login p {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .tg-widget-wrap {
      display: flex;
      justify-content: center;
    }

    /* ── Экран 2: Успех ── */
    #screen-success { display: none; }
    #screen-success.visible { display: block; }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 16px;
      display: block;
      border: 3px solid #e5e7eb;
    }
    .avatar-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2AABEE, #229ED9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 16px;
    }

    .welcome {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .username {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 28px;
    }

    /* Кнопка «Написать боту» */
    .btn-bot {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      background: #2AABEE;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-bot:hover  { background: #229ED9; }
    .btn-bot:active { transform: scale(0.98); }

    .btn-bot svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .logout {
      margin-top: 16px;
      font-size: 0.78rem;
      color: #d1d5db;
      cursor: pointer;
      transition: color 0.15s;
    }
    .logout:hover { color: #6b7280; }
  </style>
</head>
<body>

<div class="card">

  <!-- ── Экран 1: форма входа ── -->
  <div id="screen-login">
    <h1>Войдите через Telegram</h1>
    <p>После входа вы сможете написать боту.</p>
    <div class="tg-widget-wrap">
      <!--
        ⚠️  ДВА МЕСТА где нужно подставить своё:
        1. data-telegram-login  →  имя вашего бота (без @)
        2. data-auth-url        →  ваш Vercel URL + /api/auth
      -->
      <script
        async
        src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="cappeducationbot"
        data-size="large"
        data-userpic="true"
        data-radius="8"
        data-auth-url="https://YOUR_PROJECT.vercel.app/api/auth"
        data-request-access="write"
        data-onauth="onTelegramAuth(user)">
      </script>
    </div>
  </div>

  <!-- ── Экран 2: успешный вход ── -->
  <div id="screen-success">
    <div id="avatar-wrap"></div>
    <div class="welcome" id="user-name"></div>
    <div class="username" id="user-username"></div>

    <!--
      Кнопка открывает чат с ботом в Telegram.
      href подставляется динамически через JS ниже.
      Можно передать user.id как start-параметр боту,
      чтобы бот знал кто пишет.
    -->
    <a id="btn-write" class="btn-bot" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="white" fill-opacity="0.2"/>
        <path d="M17.4 7.3l-1.9 9c-.1.6-.5.8-1 .5l-2.8-2-1.3 1.3c-.2.2-.4.3-.7.3l.2-2.9 4.9-4.4c.2-.2 0-.3-.3-.1L7.6 13.5 4.9 12.7c-.6-.2-.6-.6.1-.8l11.6-4.5c.6-.2 1.1.1.8.9z" fill="white"/>
      </svg>
      Написать боту
    </a>

    <div class="logout" onclick="logout()">Выйти</div>
  </div>

</div>

<script>
  // ── Имя вашего бота (без @) ──────────────────────────────────
  var BOT_USERNAME = 'cappeducationbot';
  // ────────────────────────────────────────────────────────────

  function onTelegramAuth(user) {
    // 1. Переключаем экраны
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-success').classList.add('visible');

    // 2. Имя и юзернейм
    var fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
    document.getElementById('user-name').textContent = 'Привет, ' + fullName + '!';
    document.getElementById('user-username').textContent =
      user.username ? '@' + user.username : 'id: ' + user.id;

    // 3. Аватар (если есть)
    var wrap = document.getElementById('avatar-wrap');
    if (user.photo_url) {
      wrap.innerHTML = '<img class="avatar" src="' + user.photo_url + '" alt="Фото"/>';
    } else {
      var initials = fullName.trim()[0] || '?';
      wrap.innerHTML = '<div class="avatar-placeholder">' + initials + '</div>';
    }

    // 4. Ссылка на бота
    //    ?start=ID  — бот получит команду /start ID и узнает кто написал
    document.getElementById('btn-write').href =
      'https://t.me/' + BOT_USERNAME + '?start=' + user.id;

    // 5. Отправляем данные на backend для проверки подписи
    var params = new URLSearchParams(user).toString();
    fetch('/api/auth?' + params)
      .then(function(r) { return r.json(); })
      .then(function(data) { console.log('Backend ответил:', data); })
      .catch(function(err) { console.error('Ошибка backend:', err); });
  }

  function logout() {
    document.getElementById('screen-success').classList.remove('visible');
    document.getElementById('screen-login').style.display = 'block';
  }
</script>

</body>
</html>
